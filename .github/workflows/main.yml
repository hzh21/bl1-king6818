name: Build 2GB ATF (fip-secure)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 安装 64位 交叉编译工具链 (Install Toolchain)
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: 拉取友善之臂 ATF 源码 (Clone FriendlyARM ATF)
      run: |
        git clone https://github.com/friendlyarm/arm-trusted-firmware.git -b nanopi2 --depth 1

    - name: 强拆 TrustZone 防火墙 (Patch 1GB -> 2GB)
      run: |
        cd arm-trusted-firmware
        # 在源码中精准寻找 DRAM_SIZE 的宏定义，将 0x40000000 (1GB) 暴力扩大为 0x80000000 (2GB)
        find plat/nexell -type f -exec sed -i -E 's/(DRAM_SIZE[[:space:]]+)0x40000000/\10x80000000/g' {} +
        # 兼容性替换：防止有的地方写死了十进制的 1GB
        find plat/nexell -type f -exec sed -i -E 's/1024[[:space:]]*\*[[:space:]]*1024[[:space:]]*\*[[:space:]]*1024/2048 * 1024 * 1024/g' {} +

    - name: 编译生成专属 fip-secure.img (Build BL31)
      run: |
        cd arm-trusted-firmware
        # S5P6818 的 ATF 编译目标通常是 s5p6818，如果报错会自动 fallback 到 nanopi2
        make CROSS_COMPILE=aarch64-linux-gnu- PLAT=s5p6818 bl31 || make CROSS_COMPILE=aarch64-linux-gnu- PLAT=nanopi2 bl31
        
        # 寻找生成的 bl31.bin，这就是我们要的 fip-secure.img
        find build -name bl31.bin -exec cp {} ../fip-secure-2G.img \;

    - name: 上传最终 2GB 解锁版 ATF (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: fip-secure-2G
        path: fip-secure-2G.img
