name: Build BL1 2GB

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install AArch64 Toolchain and Python
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu python3

    - name: Compile and Pack BL1
      run: |
        make

    - name: Upload bl1-mmcboot.bin Artifact
      uses: actions/upload-artifact@v3
      with:
        name: bl1-mmcboot-2GB
        path: bl1-mmcboot.bin
